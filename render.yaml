services:
  - type: web
    name: okx-login-form
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ENABLE_CORS
        value: 'true'
    healthCheckPath: /api/health
    preDeploy: npm install
    
